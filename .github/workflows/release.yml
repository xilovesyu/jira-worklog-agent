name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.2.3
  workflow_dispatch:  # Allow manual trigger
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3)'
        required: true
        type: string

jobs:
  build-release:
    name: Build Release
    runs-on: windows-latest  # Windows for exe build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --include=optional

      - name: Install frontend dependencies
        run: npm ci --include=optional --prefix ui

      - name: Build full application
        run: npm run build

      - name: Create distribution archive
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") {
            $version = "${{ github.ref_name }}"
          }
          Compress-Archive -Path dist/* -DestinationPath "jira-worklog-agent-$version-windows.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: jira-worklog-agent-*.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-package

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Jira Worklog Agent v${{ steps.version.outputs.version }}
          body: |
            ## Jira Worklog Agent v${{ steps.version.outputs.version }}

            ### Download
            - **Windows**: Download `jira-worklog-agent-${{ steps.version.outputs.version }}-windows.zip`
            - Extract and run `jira-worklog-agent.exe`

            ### Setup
            1. Edit `config.yaml` with your Jira credentials
            2. Set `JIRA_API_TOKEN` environment variable or in `.env` file
            3. For AI recommendations, set `OPENAI_API_KEY` (optional)

            ### Changelog
            See [commits](https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version }}) for changes.

          files: jira-worklog-agent-*.zip
          draft: false
          prerelease: false
          generate_release_notes: true